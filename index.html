<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Chấm Công Nội Bộ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

<div class="container mx-auto px-4 py-8 max-w-6xl">
    <!-- HEADER -->
    <header class="text-center mb-8 relative">
        <div class="absolute right-0 top-0">
            <button id="admin-auth-btn"
                    onclick="toggleAdminAuth()"
                    class="bg-gray-800 hover:bg-gray-900 text-white text-xs font-semibold py-2 px-3 rounded-lg shadow flex items-center gap-1">
                <i class="fa-solid fa-lock"></i> <span id="auth-btn-text">Đăng nhập Admin</span>
            </button>
        </div>

        <h1 class="text-3xl font-bold text-blue-600 mb-2 mt-8 md:mt-0 flex items-center gap-3">
    <img src="tori-logo.png" class="h-46 w-auto" alt="TORI Logo">
    HỆ THỐNG CHẤM CÔNG ONLINE
</h1>

            <i class="fa-solid fa-business-time mr-2"></i>HỆ THỐNG CHẤM CÔNG ONLINE TORI
        </h1>
        <p id="live-clock" class="text-xl font-semibold text-gray-700 bg-white inline-block px-4 py-2 rounded-lg shadow-sm"></p>
    </header>

    <!-- MAIN GRID -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <!-- FORM CHẤM CÔNG -->
        <div class="bg-white p-6 rounded-xl shadow-md md:col-span-1">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Thông Tin Nhân Viên</h2>

            <div class="mb-4">
                <label class="block text-gray-600 text-sm font-medium mb-1">Mã Nhân Viên</label>
                <input type="text" id="emp-id" placeholder="VD: 001 hoặc NV001"
                       class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       oninput="autoFillName(); updateStatusBoard();">
            </div>

            <div class="mb-4">
                <label class="block text-gray-600 text-sm font-medium mb-1">Họ và Tên</label>
                <input type="text" id="emp-name" placeholder="Tự động điền..."
                       class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-6">
                <label class="block text-gray-600 text-sm font-medium mb-1">Lý do nghỉ phép (Nếu nghỉ)</label>
                <select id="leave-type"
                        class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="Nghỉ phép năm">Nghỉ phép năm (Có lương)</option>
                    <option value="Nghỉ ốm / Thai sản">Nghỉ ốm / Thai sản</option>
                    <option value="Việc riêng">Việc riêng (Không lương)</option>
                </select>
            </div>

            <div class="space-y-3">
                <button onclick="handleAttendance('Check-in')"
                        class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 shadow">
                    <i class="fa-solid fa-right-to-bracket"></i> Check-in (Vào làm)
                </button>
                <button onclick="handleAttendance('Check-out')"
                        class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 shadow">
                    <i class="fa-solid fa-right-from-bracket"></i> Check-out (Ra về)
                </button>
                <button onclick="handleAttendance('Nghỉ phép')"
                        class="w-full bg-rose-500 hover:bg-rose-600 text-white font-semibold py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 shadow">
                    <i class="fa-solid fa-calendar-xmark"></i> Đăng ký Nghỉ phép
                </button>
            </div>

            <p id="status-message" class="mt-4 text-sm font-semibold text-blue-600"></p>

            <!-- BẢNG TRẠNG THÁI -->
            <div class="mt-6 bg-gray-50 p-4 rounded-lg border shadow-sm">
                <h3 class="text-md font-bold text-gray-700 mb-2">Trạng thái hôm nay</h3>
                <div id="status-board" class="text-sm text-gray-700 space-y-1">
                    <p>Nhập Mã nhân viên để xem trạng thái.</p>
                </div>
            </div>
        </div>

        <!-- BẢNG CHẤM CÔNG -->
        <div class="bg-white p-6 rounded-xl shadow-md md:col-span-2">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-800">Lịch sử chấm công hôm nay</h2>
                <button onclick="exportToExcel()"
                        class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold py-2 px-3 rounded-lg flex items-center gap-1">
                    <i class="fa-solid fa-file-excel"></i> Xuất Excel
                </button>
            </div>

            <div class="overflow-x-auto max-h-96 border rounded-lg">
                <table class="min-w-full text-sm text-left">
                    <thead class="bg-gray-100 text-gray-700 sticky top-0">
                    <tr>
                        <th class="px-3 py-2 border">Thời gian</th>
                        <th class="px-3 py-2 border">Mã NV</th>
                        <th class="px-3 py-2 border">Họ tên</th>
                        <th class="px-3 py-2 border">Loại</th>
                        <th class="px-3 py-2 border">Lý do nghỉ</th>
                        <th class="px-3 py-2 border">Trạng thái</th>
                    </tr>
                    </thead>
                    <tbody id="attendance-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <section class="bg-white p-6 rounded-xl shadow-md">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold text-gray-800">Quản lý Admin</h2>
            <span class="text-xs text-gray-500" id="admin-status-label">Chưa đăng nhập</span>
        </div>

        <div id="admin-panel" class="hidden">
            <div class="grid md:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-gray-600 text-sm font-medium mb-1">Lọc theo Mã NV</label>
                    <input type="text" id="filter-emp-id" placeholder="VD: NV001"
                           class="w-full px-3 py-2 border rounded-lg text-sm" oninput="renderAttendanceTable(); updateChart();">
                </div>
                <div>
                    <label class="block text-gray-600 text-sm font-medium mb-1">Lọc theo loại</label>
                    <select id="filter-type"
                            class="w-full px-3 py-2 border rounded-lg text-sm"
                            onchange="renderAttendanceTable(); updateChart();">
                        <option value="">Tất cả</option>
                        <option value="Check-in">Check-in</option>
                        <option value="Check-out">Check-out</option>
                        <option value="Nghỉ phép">Nghỉ phép</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-600 text-sm font-medium mb-1">Xóa toàn bộ dữ liệu</label>
                    <button onclick="clearAllData()"
                            class="w-full bg-red-600 hover:bg-red-700 text-white text-sm font-semibold py-2 px-3 rounded-lg">
                        <i class="fa-solid fa-trash"></i> Xóa tất cả
                    </button>
                </div>
            </div>

            <div class="mt-6">
                <h3 class="text-md font-bold text-gray-700 mb-2">Biểu đồ thống kê hôm nay</h3>
                <canvas id="attendance-chart" height="120"></canvas>
            </div>
        </div>
    </section>
</div>
<script>
/* ================== ĐỒNG HỒ ================== */
function updateClock() {
    const now = new Date();
    document.getElementById("live-clock").textContent =
        now.toLocaleString("vi-VN", { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

/* ================== DANH SÁCH 100 NHÂN VIÊN ================== */
const EMPLOYEE_LIST = {
    "NV001": "Lê Xuân Hoan",
    "NV002": "Dương Văn Luận",
    "NV003": "Hoàng Văn Hiệp",
    "NV004": "Nguyễn Văn Mùi",
    "NV005": "Nguyễn Anh Tuấn",
    "NV006": "Lưu Khánh Toàn",
    "NV007": "Bùi Xuân Thu",
    "NV008": "Nguyễn Văn Tuấn",
    "NV009": "Lương Duyên Quang Trường",
    "NV010": "Nguyễn Văn Lâm",
    "NV011": "Trần Đức Hái",
    "NV012": "Đặng Văn Thắng",
    "NV013": "Hoàng Doãn Thanh",
    "NV014": "Trần Đức Toàn",
    "NV015": "Nguyễn Xuân Dương",
    "NV016": "Đặng Văn Hợp",
    "NV017": "Dương Xuân Chai",
    "NV018": "Lưu Văn Bắc",
    "NV019": "Dương Ngọc Diệp",
    "NV020": "Nguyễn Hồng Thái",
    "NV021": "Kiều Hồng Sơn",
    "NV022": "Trần Thị B",
    "NV023": "Lê Văn C",
    "NV024": "Phạm Thị D",
    "NV025": "Hoàng Văn E",
    "NV026": "Nguyễn Văn Tuấn",
    "NV027": "Trần Thị B",
    "NV028": "Lê Văn C",
    "NV029": "Phạm Thị D",
    "NV030": "Hoàng Văn E",
    "NV031": "Nguyễn Văn Tuấn",
    "NV032": "Trần Thị B",
    "NV033": "Lê Văn C",
    "NV034": "Phạm Thị D",
    "NV035": "Hoàng Văn E",
    "NV036": "Nguyễn Văn Tuấn",
    "NV037": "Trần Thị B",
    "NV038": "Lê Văn C",
    "NV039": "Phạm Thị D",
    "NV040": "Hoàng Văn E",


};
/* ================== TỰ ĐỘNG ĐIỀN TÊN ================== */
function autoFillName() {
    let empId = document.getElementById("emp-id").value.trim();

    // Nếu chỉ nhập số → tự động thêm NV + padding
    if (/^\d+$/.test(empId)) {
        empId = "NV" + empId.padStart(3, "0");
        document.getElementById("emp-id").value = empId;
    }

    // Nếu nhập nv001 → chuyển thành NV001
    empId = empId.toUpperCase();
    document.getElementById("emp-id").value = empId;

    // Tự động điền tên nếu có trong danh sách
    if (EMPLOYEE_LIST[empId]) {
        document.getElementById("emp-name").value = EMPLOYEE_LIST[empId];
    }
}

/* ================== CẤU HÌNH ================== */
const STORAGE_KEY = "attendance_records_v1";
const WORK_START = "09:00";
const WORK_END = "18:00";
const ADMIN_PASSWORD = "admin123";

let isAdmin = false;
let chartInstance = null;

/* ================== LƯU DỮ LIỆU ================== */
function getAttendanceData() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}
function saveAttendanceData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* ================== TÍNH TRẠNG THÁI ================== */
function getStatusForRecord(record) {
    const parts = record.timeDisplay.split(" ");
    const timePart = parts[parts.length - 1]; // lấy phần giờ cuối cùng
    const hm = timePart.slice(0,5); // HH:MM

    if (record.type === "Check-in") {
        return hm <= WORK_START ? "Đúng giờ" : "Đi trễ";
    }
    if (record.type === "Check-out") {
        return hm >= WORK_END ? "Đúng giờ" : "Về sớm";
    }
    if (record.type === "Nghỉ phép") return "Nghỉ phép";
    return "-";
}

/* ================== XỬ LÝ CHẤM CÔNG ================== */
function handleAttendance(type) {
    const empId = document.getElementById("emp-id").value.trim().toUpperCase();
    const empName = document.getElementById("emp-name").value.trim();
    const leaveType = document.getElementById("leave-type").value;
    const statusEl = document.getElementById("status-message");

    if (!empId || !empName) {
        statusEl.textContent = "Vui lòng nhập đầy đủ Mã nhân viên và Họ tên.";
        statusEl.classList.add("text-red-600");
        statusEl.classList.remove("text-green-600");
        return;
    }

    const now = new Date();
    const record = {
        timestamp: now.toISOString(),
        timeDisplay: now.toLocaleString("vi-VN", { hour12: false }),
        empId,
        empName,
        type,
        leaveReason: type === "Nghỉ phép" ? leaveType : ""
    };
    record.status = getStatusForRecord(record);

    const data = getAttendanceData();
    data.push(record);
    saveAttendanceData(data);

    renderAttendanceTable();
    updateStatusBoard();
    updateChart();

    statusEl.textContent = `Đã ghi nhận: ${type} (${record.status}) lúc ${record.timeDisplay}`;
    statusEl.classList.remove("text-red-600");
    statusEl.classList.add("text-green-600");
}

/* ================== BẢNG TRẠNG THÁI ================== */
function updateStatusBoard() {
    const empId = document.getElementById("emp-id").value.trim().toUpperCase();
    const board = document.getElementById("status-board");

    if (!empId) {
        board.innerHTML = "<p>Nhập Mã nhân viên để xem trạng thái.</p>";
        return;
    }

    const data = getAttendanceData();
    const today = new Date().toISOString().slice(0, 10);

    const todayRecords = data.filter(r =>
        r.empId === empId && r.timestamp.slice(0, 10) === today
    );

    const checkIn = todayRecords.find(r => r.type === "Check-in");
    const checkOut = todayRecords.find(r => r.type === "Check-out");
    const leave = todayRecords.find(r => r.type === "Nghỉ phép");

    board.innerHTML = `
        <p><strong>Check-in:</strong> ${checkIn ? checkIn.timeDisplay + " (" + checkIn.status + ")" : "Chưa"}</p>
        <p><strong>Check-out:</strong> ${checkOut ? checkOut.timeDisplay + " (" + checkOut.status + ")" : "Chưa"}</p>
        <p><strong>Nghỉ phép:</strong> ${leave ? leave.leaveReason : "Không"}</p>
    `;
}

/* ================== RENDER BẢNG ================== */
function renderAttendanceTable() {
    const tbody = document.getElementById("attendance-body");
    tbody.innerHTML = "";

    const data = getAttendanceData();
    const today = new Date().toISOString().slice(0, 10);

    const filterEmpId = document.getElementById("filter-emp-id")?.value.trim().toLowerCase() || "";
    const filterType = document.getElementById("filter-type")?.value || "";

    const filtered = data.filter(r => {
        if (r.timestamp.slice(0, 10) !== today) return false;
        if (filterEmpId && !r.empId.toLowerCase().includes(filterEmpId)) return false;
        if (filterType && r.type !== filterType) return false;
        return true;
    });

    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-3 text-gray-500">Chưa có dữ liệu hôm nay.</td></tr>`;
        return;
    }

    filtered.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td class="px-3 py-2 border">${r.timeDisplay}</td>
            <td class="px-3 py-2 border">${r.empId}</td>
            <td class="px-3 py-2 border">${r.empName}</td>
            <td class="px-3 py-2 border">${r.type}</td>
            <td class="px-3 py-2 border">${r.leaveReason || "-"}</td>
            <td class="px-3 py-2 border">${r.status}</td>
        `;
        tbody.appendChild(tr);
    });
}

/* ================== EXPORT EXCEL ================== */
function exportToExcel() {
    const data = getAttendanceData();
    if (data.length === 0) return alert("Không có dữ liệu để xuất.");

    const exportData = data.map(r => ({
        "Thời gian": r.timeDisplay,
        "Mã NV": r.empId,
        "Họ tên": r.empName,
        "Loại": r.type,
        "Lý do nghỉ": r.leaveReason,
        "Trạng thái": r.status
    }));

    const ws = XLSX.utils.json_to_sheet(exportData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "ChamCong");

    XLSX.writeFile(wb, "cham_cong.xlsx");
}

/* ================== ADMIN LOGIN ================== */
function toggleAdminAuth() {
    if (!isAdmin) {
        const pwd = prompt("Nhập mật khẩu Admin:");
        if (pwd === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById("admin-panel").classList.remove("hidden");
            document.getElementById("auth-btn-text").textContent = "Đăng xuất Admin";
            document.getElementById("admin-status-label").textContent = "Đã đăng nhập Admin";
            updateChart();
        } else {
            alert("Sai mật khẩu.");
        }
    } else {
        isAdmin = false;
        document.getElementById("admin-panel").classList.add("hidden");
        document.getElementById("auth-btn-text").textContent = "Đăng nhập Admin";
        document.getElementById("admin-status-label").textContent = "Chưa đăng nhập";
    }
}

/* ================== XÓA DỮ LIỆU ================== */
function clearAllData() {
    if (!isAdmin) return alert("Chỉ Admin mới được xóa dữ liệu.");
    if (confirm("Bạn có chắc muốn xóa toàn bộ dữ liệu?")) {
        localStorage.removeItem(STORAGE_KEY);
        renderAttendanceTable();
        updateStatusBoard();
        updateChart();
    }
}

/* ================== BIỂU ĐỒ ================== */
function updateChart() {
    if (!isAdmin) return;

    const ctx = document.getElementById("attendance-chart");
    if (!ctx) return;

    const data = getAttendanceData();
    const today = new Date().toISOString().slice(0, 10);

    const todayRecords = data.filter(r => r.timestamp.slice(0, 10) === today);

    const countCheckIn = todayRecords.filter(r => r.type === "Check-in").length;
    const countCheckOut = todayRecords.filter(r => r.type === "Check-out").length;
    const countLeave = todayRecords.filter(r => r.type === "Nghỉ phép").length;
    const lateCount = todayRecords.filter(r => r.status === "Đi trễ").length;
    const earlyCount = todayRecords.filter(r => r.status === "Về sớm").length;

    const chartData = {
        labels: ["Check-in", "Check-out", "Nghỉ phép", "Đi trễ", "Về sớm"],
        datasets: [{
            label: "Số lượng hôm nay",
            data: [countCheckIn, countCheckOut, countLeave, lateCount, earlyCount],
            backgroundColor: ["#10b981", "#f59e0b", "#f97373", "#3b82f6", "#6366f1"]
        }]
    };

    if (chartInstance) {
        chartInstance.data = chartData;
        chartInstance.update();
    } else {
        chartInstance = new Chart(ctx, {
            type: "bar",
            data: chartData,
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, precision: 0 } }
            }
        });
    }
}

/* ================== KHỞI TẠO ================== */
renderAttendanceTable();
updateStatusBoard();
</script>
</body>
</html>
